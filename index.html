      /* Utility: shuffle array in-place */
      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      /* Prepare quiz state */
      let state = {
        questions: [],
        current: 0,
        answers: Array(QUESTIONS.length).fill(null),
        startedAt: null,
        durationSec: 30 * 60, // 30 minutes
      };

      /* Initialize: clone and randomize questions and options */
      function initQuiz() {
        // deep clone
        state.questions = QUESTIONS.map((q) => ({
          q: q.q,
          opts: q.opts.slice(),
          a: q.a,
        }));
        // shuffle questions
        shuffle(state.questions);
        // shuffle options for each question but keep track of correct index
        state.questions.forEach((item) => {
          const original = item.opts.map((o, i) => ({ o, i }));
          shuffle(original);
          item.opts = original.map((x) => x.o);
          // find new index where original index === item.a
          item.a = original.findIndex((x) => x.i === item.a);
        });
        state.answers = Array(state.questions.length).fill(null);
        state.current = 0;
        state.startedAt = Date.now();
        renderQuestion();
        renderNav();
        updateScoreMeta();
        startTimer();
      }

      /* Render question */
      function renderQuestion() {
        const area = document.getElementById("quizArea");
        const idx = state.current;
        const item = state.questions[idx];
        const answered = state.answers[idx] !== null;
        const qnum = idx + 1;
        area.innerHTML = `
    <div class="qnum">Question ${qnum} of ${state.questions.length}</div>
    <div class="qtext">${escapeHtml(item.q)}</div>
    <div class="options" id="opts">
      ${item.opts.map((opt, i) => `<div class="opt" data-i="${i}" role="button" tabindex="0">${escapeHtml(opt)}</div>`).join("")}
    </div>
  `;
        // attach handlers
        document.querySelectorAll("#opts .opt").forEach((el) => {
          el.addEventListener("click", () =>
            selectOption(parseInt(el.dataset.i)),
          );
          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter") selectOption(parseInt(el.dataset.i));
          });
          if (state.answers[idx] === parseInt(el.dataset.i))
            el.classList.add("selected");
        });
      }

      /* Option select */
      function selectOption(optIndex) {
        state.answers[state.current] = optIndex;
        // mark nav button
        const navBtn = document.getElementById("nav-" + state.current);
        if (navBtn) navBtn.classList.add("answered");
        // update UI selection
        document
          .querySelectorAll("#opts .opt")
          .forEach((el) => el.classList.remove("selected"));
        const chosen = document.querySelector(
          `#opts .opt[data-i="${optIndex}"]`,
        );
        if (chosen) chosen.classList.add("selected");
        updateScoreMeta();
      }

      /* Navigation grid */
      function renderNav() {
        const grid = document.getElementById("navGrid");
        grid.innerHTML = "";
        for (let i = 0; i < state.questions.length; i++) {
          const btn = document.createElement("button");
          btn.className = "nav-btn";
          btn.id = "nav-" + i;
          btn.textContent = i + 1;
          btn.addEventListener("click", () => {
            state.current = i;
            renderQuestion();
          });
          grid.appendChild(btn);
        }
      }

      /* Update answered count and progress */
      function updateScoreMeta() {
        const answered = state.answers.filter((x) => x !== null).length;
        document.getElementById("scoreMeta").textContent =
          `Answered ${answered} / ${state.questions.length}`;
        const pct = Math.round((answered / state.questions.length) * 100);
        document.getElementById("prog").style.width = pct + "%";
      }

      /* Prev/Next handlers */
      document.getElementById("prevBtn").addEventListener("click", () => {
        if (state.current > 0) {
          state.current--;
          renderQuestion();
        }
      });
      document.getElementById("nextBtn").addEventListener("click", () => {
        if (state.current < state.questions.length - 1) {
          state.current++;
          renderQuestion();
        }
      });

      /* Submit */
      document.getElementById("submitBtn").addEventListener("click", () => {
        if (confirm("Submit quiz now?")) finishQuiz();
      });

      /* Timer */
      let timerInterval = null;
      function startTimer() {
        clearInterval(timerInterval);
        const end = state.startedAt + state.durationSec * 1000;
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
        function updateTimer() {
          const now = Date.now();
          let secLeft = Math.max(0, Math.round((end - now) / 1000));
          const mm = String(Math.floor(secLeft / 60)).padStart(2, "0");
          const ss = String(secLeft % 60).padStart(2, "0");
          document.getElementById("timer").textContent = `${mm}:${ss}`;
          // progress bar for time (rightmost)
          const elapsed = state.durationSec - secLeft;
          const timePct = Math.round((elapsed / state.durationSec) * 100);
          // small visual: adjust prog width slightly by time too (not to confuse with answered progress)
          // when time ends:
          if (secLeft <= 0) {
            clearInterval(timerInterval);
            alert("Time is up — the quiz will be submitted automatically.");
            finishQuiz();
          }
        }
      }

      /* Finish quiz: compute score and show answers */
      function finishQuiz() {
        clearInterval(timerInterval);
        // compute
        let correct = 0;
        const details = state.questions.map((item, i) => {
          const user = state.answers[i];
          const isCorrect = user !== null && user === item.a;
          if (isCorrect) correct++;
          return {
            q: item.q,
            opts: item.opts,
            correctIndex: item.a,
            userIndex: user,
            isCorrect,
          };
        });
        // show result
        const area = document.getElementById("resultArea");
        area.style.display = "block";
        area.innerHTML = `<div style="font-size:18px;font-weight:700">Score: ${correct} / ${state.questions.length}</div>
    <div style="margin-top:10px;color:var(--muted)">Review below: correct answers are highlighted in green.</div>
    <div style="margin-top:12px;max-height:420px;overflow:auto;padding-right:8px">
      ${details
        .map(
          (d, idx) => `
        <div style="padding:10px;border-radius:8px;margin-bottom:8px;background:#fbfdff;border:1px solid #eef7ff">
          <div style="font-weight:600">Q${idx + 1}. ${escapeHtml(d.q)}</div>
          <div style="margin-top:6px">
            ${d.opts
              .map(
                (
                  opt,
                  i,
                ) => `<div style="padding:6px;border-radius:6px;margin:4px 0;background:${i === d.correctIndex ? "#e6fff7" : i === d.userIndex && !d.isCorrect ? "#fff0f0" : "#fff"};border:1px solid ${i === d.correctIndex ? "#b6f0d8" : i === d.userIndex && !d.isCorrect ? "#f5c6cb" : "#eef7ff"}">
              ${escapeHtml(opt)} ${i === d.correctIndex ? '<span style="color:green;font-weight:700"> (Correct)</span>' : ""} ${i === d.userIndex && !d.isCorrect ? '<span style="color:#d9534f;font-weight:700"> (Your answer)</span>' : ""}
            </div>`,
              )
              .join("")}
          </div>
        </div>`,
        )
        .join("")}
    </div>
    <div style="margin-top:12px"><button id="restartBtn">Restart Quiz</button></div>
  `;
        document.getElementById("restartBtn").addEventListener("click", () => {
          initQuiz();
          document.getElementById("resultArea").style.display = "none";
        });
        // scroll to result
        area.scrollIntoView({ behavior: "smooth" });
      }

      /* Escape HTML helper */
      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (c) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[c],
        );
      }

      /* On load */
      window.addEventListener("load", () => {
        initQuiz();
      });
    </script>
